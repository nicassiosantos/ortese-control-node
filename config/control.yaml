control_node:
  ros__parameters:
    # --- Comunicacao RS485 (via conversor USB-Serial) ---
    port: "/dev/ttyUSB0"       # porta do conversor USB-RS485
    baudrate: 115200           # baud do motor (default do LingLong)
    motor_id: 1                # ID do motor
    update_rate_ms: 5          # 5 ms = 200 Hz (limite do RS485 a 115200 baud)

    # ===================================================================
    #  Valores do datasheet MG8008E-i9 V3 (Riotech)
    # ===================================================================
    tau_max: 20.0              # Max Torque [N.m]
    kt: 2.0                    # Torque Constant [N.m/A] (eixo de saida)
    i_max: 12.0                # Max Current [A]
    gear_ratio: 9.0            # Gear Reduction Ratio 9:1
    temp_limit: 70             # corte de seguranca [C]

    # --- Ganhos do PID (alocacao de polos, zeta=0.8 wn=8 alpha=8) ---
    kp: 190.6
    ki: 884.1
    kd: 16.07

    # --- Parametros fisicos da planta (feedforward IDB) ---
    D11: 0.2158                # inercia efetiva [kg.m^2]
    mgd: 7.848                 # torque gravitacional maximo [N.m]
    b: 0.5                     # atrito viscoso [N.m.s/rad]
    use_feedforward: true      # true = IDB+PID ; false = PID puro

    # ===================================================================
    #  PENDENTE: calibracao da escala comando->corrente (raw_max no
    #  mg_motor_serial.hpp, default 2000). Ajustar apos o teste eletrico.
    # ===================================================================